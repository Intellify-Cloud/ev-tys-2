---
layout: page
title: Page Not Found
background: white
hide_contact_strip: true
---

<style>
  .not-found {
    width: 100vw;
    min-height: 72vh;
    margin-left: calc(-50vw + 50%);
    padding: 160px 24px 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0ede6;
    text-align: center;
  }

  .not-found__inner {
    max-width: 760px;
    margin: 0 auto;
  }

  .not-found__code {
    margin: 0 0 14px;
    color: #e8522a;
    font-size: clamp(92px, 18vw, 180px);
    font-weight: 800;
    line-height: 0.85;
  }

  .not-found__title {
    margin: 0 0 18px;
    color: rgb(12, 80, 69);
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 800;
    line-height: 1;
  }

  .not-found__copy {
    max-width: 560px;
    margin: 0 auto 34px;
    color: #4a4a4a;
    font-size: 18px;
    line-height: 1.6;
  }

  .not-found__actions {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .not-found__button {
    min-width: 170px;
    padding: 14px 28px;
    border-radius: 999px;
    font-weight: 700;
    text-decoration: none;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }

  .not-found__button:hover {
    transform: translateY(-2px);
    text-decoration: none;
  }

  .not-found__button--primary {
    background: #e8522a;
    color: #ffffff;
  }

  .not-found__button--primary:hover {
    color: #ffffff;
    opacity: 0.92;
  }

  .not-found__button--secondary {
    background: #ffffff;
    color: rgb(12, 80, 69);
  }

  .not-found__button--secondary:hover {
    color: rgb(12, 80, 69);
  }

  @media (max-width: 768px) {
    .not-found {
      min-height: 68vh;
      padding: 120px 20px 70px;
    }

    .not-found__copy {
      font-size: 16px;
    }

    .not-found__button {
      width: 100%;
      max-width: 260px;
    }
  }
</style>

<section class="not-found" aria-labelledby="not-found-title">
  <div class="not-found__inner">
    <p class="not-found__code">404</p>
    <h1 id="not-found-title" class="not-found__title">This page moved out.</h1>
    <p class="not-found__copy">
      The page you are looking for is not here, but we can still help you find your way home.
    </p>
    <div class="not-found__actions">
      <a class="not-found__button not-found__button--primary" href="{{ site.baseurl }}/">Go home</a>
      <a class="not-found__button not-found__button--secondary" href="{{ site.baseurl }}/contact">Contact us</a>
    </div>
  </div>
</section>
