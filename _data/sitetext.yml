header:
  title: "mzansi bonds"
  text: "We take the stress out of the process. Your application goes to multiple banks simultaneously — including your own — so they compete for your business and you walk away with the best rate on the table. Real savings, real peace of mind. And because we're paid by the banks on registration, our service is completely free to you."
  highlights:
    - title: "Bond Origination"
      icon: "fas fa-home"
    - title: "Debt Removal"
      icon: "fas fa-shield-alt"
    - title: "Vehicle Finance"
      icon: "fas fa-car"

hero:
  eyebrow: "Secure the best bond deals."
  headline: "Own your dream."
  body1: "Take ownership of your future through property."
  body2: "We simplify the bond process and secure the best deals from the banks."
  button: "Get Started"

intro:
  title: "Secure the best<br />bond deals."
  body: "Mzansi bonds empowers the people of South Africa to take ownership of their future through property. As a champion for everyday South Africans, we simplify the bond process, unlock the best deals from the banks, and guide people on the journey to home ownership."

expert:
  title: "Expert<br />guidance from<br />start to finish."
  body: "We guide you through every step of the bond process so you can move forward with confidence."
  cta_text: "WhatsApp us for expert advice."
  image_alt: "Expert consultation"

2-col-image_left_text_right:
  title: "Access to the<br />best deals from<br />the banks."
  body: "We work with South Africa's leading banks to secure the most competitive home loan offers."
  cta_text: "Get<br />started."
  image_alt: "Man on sofa"

nocharge:
  title: "No Charge for our Service"
  text: "We earn a once-off fee from the banks for each registered home loan. Our service is at zero cost to you."
  button 1 text: ""
  button 2 text: ""

services:
  title: "Services We Offer"
  text: "We get you the best deal on your Home Loan by sourcing quotes from all the leading banks (including your own bank) for you to compare."
  section: services
  list:
    - title: "Pre-qualification"
      desc: "Contact us before you start looking at properties. With our streamlined pre-approval process, we will give you advice around your qualifying and affordability range, as well as on improving your credit and affordability profiles."
      icon: fas fa-tasks
      link:
        url: /contact
        text: "Contact Bond Studio"
    - title: "Bond Origination"
      desc: "We work hard on negotiating the best possible terms and interest rates for all our clients. Complete our easy Home Loan application form, and we will ensure that all your documentation is correct to be submitted to all the banks. We liaise with all the major banks (including your own bank) to guarantee you the best interest rates and deal on your Home Loan. "
      icon: fas fas fa-home
      link:
        url: /contact
        text: "mzansi bonds Finance"
    - title: "Insurance"
      desc: "We offer competitive insurance products including Building Insurance and Mortgage Protection, bringing all your home loan options under one roof."
      icon: fas fa-shield-alt
      link:
        url: /contact
        text: "mzansi bonds Finance"

