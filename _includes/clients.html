<section class="rounded-[12px] mx-2 sm:mx-4 md:mx-10" style="background-color: #FDF9EB; padding-top: 110px; padding-bottom: 110px; margin-top: 0;" id="clients">
  <div class="max-w-[1200px] mx-auto px-4 sm:px-6 md:px-10 lg:px-20 text-center">
    
    <!-- Top Heading -->
    <div class="mb-10 sm:mb-12 md:mb-[3.5rem]">
      <h2 class="text-[28px] sm:text-[34px] md:text-[40px] lg:text-[42px] font-extrabold leading-[1]" style="font-family: Poppins, sans-serif; font-weight: 800; color: #5f203e;">
        {{ site.data.sitetext.clients.title | default: "We work with all the leading banks" }}
      </h2>
    </div>

    <!-- Client Logos -->
    <div class="grid grid-cols-4" style="column-gap: 12px; row-gap: 19px;">
      {% for client in site.data.sitetext.clients.list %}
      <a href="{{ client.url }}" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center h-20 px-4 rounded hover:opacity-80 transition-opacity">
        {% if client.logo %}
          <img src="{{ site.baseurl }}/{{ client.logo }}" alt="{{ client.title }}" class="max-h-[5rem] max-w-full object-contain sepia-[100%] opacity-90">
        {% else %}
          <span class="text-[#5f203e] font-semibold text-sm">{{ client.title }}</span>
        {% endif %}
      </a>
      {% endfor %}
    </div>

  </div>
</section>
