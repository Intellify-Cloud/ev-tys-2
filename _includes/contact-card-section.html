{% assign card = site.data.sitetext.contact_card_section %}
{% assign whatsapp_text = site.contact.whatsapp_message | url_encode %}

<style>
.contact-card-section__button--call {
  background: #f9d3e3;
  border: none;
  color: #e8522a;
  border-radius: 24px;
  padding: 10px 20px;
}
.contact-card-section__button--call:hover,
.contact-card-section__button--call:focus-visible {
  background: #ffffff;
  color: #e8522a;
  text-decoration: none;
}
.contact-card-section__button--email {
  background: #e8522a;
  border: none;
  color: white;
  border-radius: 24px;
  padding: 10px 20px;
}
</style>

<!-- BEGIN: ContactCardSection -->
<div class="contact-card-section">
  <div class="contact-container">
    <article class="contact-card-section__card">
      <div class="contact-card-section__content">
        <h2 class="contact-card-section__title">{{ card.title }}</h2>
        <p class="contact-card-section__text">{{ card.text }}</p>
        <div class="contact-card-section__actions">
          <a class="contact-card-section__button contact-card-section__button--call" href="https://wa.me/{{ site.contact.whatsapp }}?text={{ whatsapp_text }}" target="_blank" rel="noopener noreferrer">
            {{ card.call_text }}
          </a>
          <a class="contact-card-section__button contact-card-section__button--email" href="mailto:{{ site.contact.email }}">
            {{ card.email_text }}
          </a>
        </div>
      </div>
      <div class="contact-card-section__photo-wrap">
        <img
          src="{{ site.baseurl }}{{ card.image }}"
          alt="{{ card.image_alt }}"
          class="contact-card-section__photo">
      </div>
    </article>
  </div>
</div>
<!-- END: ContactCardSection -->
