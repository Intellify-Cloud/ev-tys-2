<!-- Contact -->
<section class="contact-section" id="{{ site.data.sitetext.contact.section | default: 'contact' }}">
  <style>
    .form-input, .form-textarea {
      background-color: #bfe1d1;
      border-radius: 8px;
      font-size: 15px;
    }
  </style>
  <div class="contact-hero-form" style="background-image: url('{{ site.baseurl }}/assets/img/sections/contact-bg-1900.jpg');">
    <div class="contact-hero-form__overlay"></div>
    {% include nav.html variant="hero" %}
    <div class="contact-container contact-hero-form__inner">
      <div class="contact-heading">
        <h1 class="contact-heading__title">{{ site.data.sitetext.contact.hero_title }}</h1>
        <p class="contact-heading__text">
          {{ site.data.sitetext.contact.text }}
        </p>
      </div>

      <form id="contactForm" class="contact-form">
        <div class="contact-form__honeypot" aria-hidden="true">
          <label for="location">Location</label>
          <input id="location" name="location" type="text" tabindex="-1" autocomplete="off" />
        </div>

        <div class="contact-form__grid">
          <div class="form-field">
            <label for="firstName">{{ site.data.sitetext.contact.form.first_name_label }} <span class="req">*</span></label>
            <input id="firstName" name="firstName" type="text" class="form-input" placeholder="{{ site.data.sitetext.contact.form.first_name_placeholder }}" />
            <span class="error-message" id="error-firstName"></span>
          </div>

          <div class="form-field">
            <label for="lastName">{{ site.data.sitetext.contact.form.last_name_label }} <span class="req">*</span></label>
            <input id="lastName" name="lastName" type="text" class="form-input" placeholder="{{ site.data.sitetext.contact.form.last_name_placeholder }}" />
            <span class="error-message" id="error-lastName"></span>
          </div>

          <div class="form-field">
            <label for="emailAddress">{{ site.data.sitetext.contact.form.email_label }} <span class="req">*</span></label>
            <input id="emailAddress" name="emailAddress" type="email" class="form-input" placeholder="{{ site.data.sitetext.contact.form.email_placeholder }}" />
            <span class="error-message" id="error-emailAddress"></span>
          </div>

          <div class="form-field">
            <label for="phoneNumber">{{ site.data.sitetext.contact.form.phone_label }} <span class="req">*</span></label>
            <input id="phoneNumber" name="phoneNumber" type="tel" class="form-input" placeholder="{{ site.data.sitetext.contact.form.phone_placeholder }}" />
            <span class="error-message" id="error-phoneNumber"></span>
          </div>

          <div class="form-field form-field--full">
            <label for="content">{{ site.data.sitetext.contact.form.message_label }}</label>
            <textarea id="content" name="content" rows="5" class="form-input form-textarea" placeholder="{{ site.data.sitetext.contact.form.message_placeholder }}"></textarea>
            <span class="error-message" id="error-content"></span>
          </div>
        </div>

        <div id="status-sent" class="status-message success" style="display:none;">
          {{ site.data.sitetext.contact.form.success_message }}
        </div>
        <div id="status-error" class="status-message error" style="display:none;">
          {{ site.data.sitetext.contact.form.error_message }}
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">
          <span>{{ site.data.sitetext.contact.form.submit_text }}</span>
        </button>
      </form>
    </div>
  </div>

  {% include contact-card-section.html %}
</section>
<!-- End Contact -->

<script>
  (function () {
    'use strict';

    const form = document.getElementById('contactForm');
    const API_URL = '{{ site.broadsheetApiUrl }}';
    const submitBtn = document.getElementById('submitBtn');
    const statusSent = document.getElementById('status-sent');
    const statusError = document.getElementById('status-error');

    const fields = {
      firstName: document.getElementById('firstName'),
      lastName: document.getElementById('lastName'),
      emailAddress: document.getElementById('emailAddress'),
      phoneNumber: document.getElementById('phoneNumber'),
      location: document.getElementById('location'),
      content: document.getElementById('content')
    };

    const errors = {
      firstName: document.getElementById('error-firstName'),
      lastName: document.getElementById('error-lastName'),
      emailAddress: document.getElementById('error-emailAddress'),
      phoneNumber: document.getElementById('error-phoneNumber'),
      content: document.getElementById('error-content')
    };

    function clearErrors() {
      Object.keys(errors).forEach(function (key) {
        errors[key].textContent = '';
        if (fields[key]) fields[key].classList.remove('error');
      });
      statusSent.style.display = 'none';
      statusError.style.display = 'none';
    }

    function setError(field, message) {
      errors[field].textContent = message;
      fields[field].classList.add('error');
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function validateForm() {
      let isValid = true;
      clearErrors();

      if (!fields.firstName.value.trim()) { setError('firstName', '{{ site.data.sitetext.contact.form.first_name_error }}'); isValid = false; }
      if (!fields.lastName.value.trim()) { setError('lastName', '{{ site.data.sitetext.contact.form.last_name_error }}'); isValid = false; }

      if (!fields.emailAddress.value.trim()) {
        setError('emailAddress', '{{ site.data.sitetext.contact.form.email_required_error }}'); isValid = false;
      } else if (!isValidEmail(fields.emailAddress.value)) {
        setError('emailAddress', '{{ site.data.sitetext.contact.form.email_invalid_error }}'); isValid = false;
      }

      if (!fields.phoneNumber.value.trim()) { setError('phoneNumber', '{{ site.data.sitetext.contact.form.phone_error }}'); isValid = false; }

      return isValid;
    }

    async function handleSubmit(e) {
      e.preventDefault();
      if (!validateForm()) return;

      if (!API_URL) {
        statusError.textContent = '{{ site.data.sitetext.contact.form.config_error_message }}';
        statusError.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.querySelector('span').textContent = '{{ site.data.sitetext.contact.form.sending_text }}';

      try {
        const fullName = fields.firstName.value.trim() + ' ' + fields.lastName.value.trim();
        const body = {
          name: fullName,
          emailAddress: fields.emailAddress.value.trim(),
          phoneNumber: fields.phoneNumber.value.trim(),
          location: fields.location.value,
          content: fields.content.value.trim(),
          fromName: 'Mzansi Bonds',
          fromEmail: 'noreply@mzansibonds.co.za',
          replyToName: fullName,
          replyToEmail: fields.emailAddress.value.trim(),
          subject: 'New Mzansi Bonds website enquiry'
        };

        const response = await fetch(API_URL + '/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (!response.ok) throw new Error('Network error: ' + response.status);

        form.reset();
        clearErrors();
        statusSent.style.display = 'block';
        statusSent.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      } catch (err) {
        statusError.style.display = 'block';
        statusError.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      } finally {
        submitBtn.disabled = false;
        submitBtn.querySelector('span').textContent = '{{ site.data.sitetext.contact.form.submit_text }}';
      }
    }

    form.addEventListener('submit', handleSubmit);

    Object.keys(fields).forEach(function (key) {
      if (errors[key] && fields[key]) {
        fields[key].addEventListener('input', function () {
          if (this.value.trim()) {
            errors[key].textContent = '';
            this.classList.remove('error');
          }
        });
      }
    });
  })();
</script>
