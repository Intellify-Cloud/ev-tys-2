<head>
{% if site.analytics.google %}
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.analytics.google }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
		gtag('config', '{{ site.analytics.google }}');
  </script>
<!-- End Google Analytics -->

{% endif %}

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="title" content="{{ site.title }}">
  <meta name="description" content="{{ site.description }}">
  <!-- Primary Meta Tags -->

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.baseurl }}">
  <meta property="og:title" content="{{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:image" content="{{ site.baseurl }}/social_916x509.jpg">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="{{ site.baseurl }}">
  <meta property="twitter:title" content="{{ site.title }}">
  <meta property="twitter:description" content="{{ site.description }}">
  <meta property="twitter:image" content="{{ site.baseurl }}/social_916x509.jpg">


  <meta name="author" content="{{ site.author }}">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.baseurl }}">

  <title>{% if page.title %}{{ page.title | append: " | " | append: site.title }}{% else %}{{ site.title }}{% endif %}</title>

  <link rel="icon" href="{{ site.baseurl }}/favicon.png" type="image/png">
  <link rel="stylesheet" href="{{ site.baseurl | append: "/assets/bundle.css" | relative_url }}">
  
  <!-- Tailwind CSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <!-- Google Fonts for typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&amp;family=Poppins:wght@400;600;700;800&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'mzansi-orange': '#F15A24',
            'mzansi-cream': '#FDF9EB',
            'mzansi-teal': '#bde3d3',
            'mzansi-purple': '#5E203F',
            'mzansi-text': '#5E203F',
            'mzansi-sage': '#bde3d3',
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <style data-purpose="custom-styling">
    body {
      background-color: #FDF9EB;
      color: #5E203F;
      font-family: 'Outfit', sans-serif;
    }
    .step-circle {
      transition: transform 0.3s ease;
    }
    .step-circle:hover {
      transform: scale(1.05);
    }
    .rounded-section-top {
      border-top-left-radius: 100px;
      border-top-right-radius: 100px;
    }
    .form-input {
      background-color: #FFF9E5 !important;
      border-color: #E6DEBC !important;
    }
    @media (min-width: 720px) and (max-width: 1024px) {
      .step-circle-md {
        width: 155px !important;
        height: 155px !important;
      }
    }
  </style>

  <script src="{{ site.baseurl | append: "/assets/bundle.js" | relative_url }}"></script>
  <script lang="js">var baseurl = "{{ "" | relative_url }}";</script>

  <!-- Page container change top padding when nav shrinks -->
  {% if page.layout == "page" %}
  <style>
    #pagecontainer {padding-top: 20px;}

    @media only screen and (max-width: 991px) {
	  #pagecontainer {padding-top: 20px;}
	}
  </style>
  {% endif %}

</head>
