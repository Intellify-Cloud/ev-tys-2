<!-- BEGIN: Hero Section -->
<section
  class="hero-container relative flex flex-col"
  data-purpose="hero-main"
  style="background-image: url('{{ site.baseurl }}/assets/img/hero/hero-landscape-large.png');">

  <!-- BEGIN: MainHeader -->
  <header class="w-full px-6 py-6 md:py-8 z-10">
    <div class="max-w-[1200px] mx-auto flex justify-between items-center">
      <a class="flex items-center" data-purpose="logo" href="{{ site.baseurl }}/">
        <img
          alt="Mzansi Bonds"
          class="h-12 md:h-14 w-auto"
          src="{{ site.baseurl }}/assets/img/logo/mzansi-bonds-logo.png">
      </a>

      <div class="flex items-center space-x-6">
        <a
          class="hidden md:block bg-[#FF4500] text-white px-8 py-3 rounded-full font-bold text-lg hover:bg-orange-600 transition-colors"
          data-purpose="cta-button-header"
          href="{{ site.baseurl }}/#get-started">
          {{ site.data.sitetext.hero.button }}
        </a>

        <button
          aria-label="Menu"
          class="flex flex-col justify-center items-end group"
          data-purpose="mobile-menu-toggle"
          type="button">
          <span class="menu-line w-8"></span>
          <span class="menu-line w-8"></span>
          <span class="menu-line w-8"></span>
        </button>
      </div>
    </div>
  </header>
  <!-- END: MainHeader -->

  <!-- BEGIN: Hero Content -->
  <main class="flex-grow flex items-center px-6 py-12 md:py-24">
    <div class="max-w-[1200px] mx-auto w-full">
      {% assign hero_words = site.data.sitetext.hero.headline | split: " " %}
      <h1
        class="heading-stacked text-[#004236] text-6xl md:text-8xl lg:text-9xl font-bold tracking-tight"
        data-purpose="hero-headline">
        {% for word in hero_words %}{{ word }}{% unless forloop.last %}<br>{% endunless %}{% endfor %}
      </h1>
    </div>
  </main>
  <!-- END: Hero Content -->

  <div class="md:hidden px-6 pb-12"></div>
</section>
<!-- END: Hero Section -->

<script data-purpose="navigation-logic">
  (function () {
    const menuBtn = document.querySelector('[data-purpose="mobile-menu-toggle"]');
    if (menuBtn) {
      menuBtn.addEventListener('click', function () {
        document.body.classList.toggle('mobile-menu-open');
      });
    }
  })();
</script>
