{% assign section = site.data.sitetext.multi_cards %}

<!-- BEGIN: MultiCardsSection -->
<section
  class="multi-cards"
  style="background-image: url('{{ site.baseurl }}{{ section.background_image }}');">
  <div class="multi-cards__container">
    <h2 class="multi-cards__heading">{{ section.heading }}</h2>

    <div class="multi-cards__grid">
      <article class="multi-cards__card multi-cards__card--newsletter">
        <img
          class="multi-cards__image"
          src="{{ site.baseurl }}{{ section.newsletter.image }}"
          alt="{{ section.newsletter.image_alt }}"
          loading="lazy">
        <div class="multi-cards__newsletter-content">
          <h3 class="multi-cards__newsletter-title">{{ section.newsletter.title }}</h3>
          {% comment %}
          <form class="multi-cards__newsletter-form">
            <label class="sr-only" for="newsletter-email">{{ section.newsletter.input_label }}</label>
            <input
              id="newsletter-email"
              class="multi-cards__newsletter-input"
              type="email"
              placeholder="{{ section.newsletter.input_placeholder }}">
            <button class="multi-cards__newsletter-button" type="submit">
              <span class="multi-cards__button-text multi-cards__button-text--desktop">{{ section.newsletter.button_text }}</span>
              <span class="multi-cards__button-text multi-cards__button-text--mobile">{{ section.newsletter.mobile_button_text | default: section.newsletter.button_text }}</span>
            </button>
          </form>
          {% endcomment %}
        </div>
      </article>

      <article class="multi-cards__card multi-cards__card--brand">
        <img
          class="multi-cards__mark"
          src="{{ site.baseurl }}{{ section.brand.icon }}"
          alt=""
          aria-hidden="true">
        <h3 class="multi-cards__brand-title">{{ section.brand.title }}</h3>
      </article>

      <article class="multi-cards__card multi-cards__card--calculator">
        <img
          class="multi-cards__image"
          src="{{ site.baseurl }}{{ section.calculator.image }}"
          alt="{{ section.calculator.image_alt }}"
          loading="lazy">
        <div class="multi-cards__calculator-panel">
          <h3 class="multi-cards__calculator-title">{{ section.calculator.title }}</h3>
          <a class="multi-cards__calculator-button" href="{{ site.baseurl }}{{ section.calculator.button_link }}">
            {{ section.calculator.button_text }}
          </a>
        </div>
      </article>
    </div>
  </div>
</section>
<!-- END: MultiCardsSection -->
